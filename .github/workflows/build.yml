name: Build

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag}" =~ ^v[0-9]+(\.[0-9]+)*(-[0-9A-Za-z][0-9A-Za-z.-]*)?-[0-9]+(\.[0-9]+)*$ ]]; then
            echo "::error::Release tag must match v{mod_version}-{minecraft_version}, for example v0.0.2-1.21.1"
            exit 1
          fi

          mod_version="$(grep '^mod_version=' gradle.properties | cut -d= -f2- | tr -d '[:space:]')"
          minecraft_version="$(grep '^minecraft_version=' gradle.properties | cut -d= -f2- | tr -d '[:space:]')"
          expected_tag="v${mod_version}-${minecraft_version}"

          if [[ "${tag}" != "${expected_tag}" ]]; then
            echo "::error::Release tag ${tag} does not match gradle.properties (${expected_tag})"
            exit 1
          fi

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build --stacktrace -Pci=true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crafting-tracker-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          generate_release_notes: true
